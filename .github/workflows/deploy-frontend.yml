name: Deploy Frontend

on:
  push:
    branches:
      - master
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

# Needed for AWS OIDC
permissions:
  id-token: write
  contents: read

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Corepack and pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Set Vite env (production)
        working-directory: frontend
        run: |
          echo "VITE_API_URL=${{ secrets.VITE_API_URL }}" > .env.production

      - name: Build frontend
        working-directory: frontend
        run: pnpm run build

      - name: Check if S3 deploy has changes
        id: s3_changes
        shell: bash
        run: |
          DRYRUN_OUTPUT=$(aws s3 sync frontend/dist/ s3://${{ secrets.S3_BUCKET_NAME }}/ --delete --dryrun)
          echo "$DRYRUN_OUTPUT"

          if [ -n "$DRYRUN_OUTPUT" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "S3 deploy changes detected"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No S3 deploy changes detected; skipping S3 deploy"
          fi

      - name: Create build-info JSON
        shell: bash
        run: |
          mkdir -p frontend/dist/metadata
          BUILD_TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          cat > frontend/dist/metadata/build-info.json <<EOF
          {
            "buildNumber": "${{ github.run_number }}",
            "buildTimestamp": "$BUILD_TIMESTAMP"
          }
          EOF

      - name: Deploy dist to S3
        run: |
          aws s3 sync frontend/dist/ s3://${{ secrets.S3_BUCKET_NAME }}/ --delete --exclude "assets/*"
          aws s3 sync frontend/dist/assets/ s3://${{ secrets.S3_BUCKET_NAME }}/assets/ --cache-control "public,max-age=31536000,immutable"
          for file in frontend/dist/*.html; do
            if [ -f "$file" ]; then
              key="${file#frontend/dist/}"
              aws s3 cp "$file" "s3://${{ secrets.S3_BUCKET_NAME }}/$key" --cache-control "public,max-age=0,must-revalidate"
            fi
          done
          aws s3 cp frontend/dist/ s3://${{ secrets.S3_BUCKET_NAME }}/ \
            --recursive \
            --exclude "*" \
            --include "*.css" \
            --include "*.svg" \
            --exclude "assets/*" \
            --cache-control "public,max-age=31536000"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Submit IndexNow for changed URLs
        shell: bash
        run: |
          python - <<'PY'
          import glob
          import json
          import subprocess
          import sys
          import xml.etree.ElementTree as ET

          SITEMAP_PATTERN = "frontend/public/sitemap-*.xml"

          def parse_urls(xml_text: str) -> set[str]:
              root = ET.fromstring(xml_text)
              ns = {"ns": "http://www.sitemaps.org/schemas/sitemap/0.9"}
              return {loc.text.strip() for loc in root.findall(".//ns:loc", ns) if loc.text}

          def collect_urls_from_sitemaps(paths, use_git_prev=False) -> set[str]:
              urls = set()
              for p in paths:
                  try:
                      if use_git_prev:
                          xml_text = subprocess.check_output(
                              ["git", "show", f"HEAD^:{p}"],
                              text=True,
                              stderr=subprocess.DEVNULL,
                          )
                      else:
                          with open(p, "r", encoding="utf-8") as f:
                              xml_text = f.read()
                      urls |= parse_urls(xml_text)
                  except Exception:
                      pass
              return urls

          sitemap_files = sorted(glob.glob(SITEMAP_PATTERN))
          if not sitemap_files:
              print("No language sitemaps found; skipping IndexNow.")
              sys.exit(0)

          current_urls = collect_urls_from_sitemaps(sitemap_files)
          prev_urls = collect_urls_from_sitemaps(sitemap_files, use_git_prev=True)

          changed_urls = sorted(current_urls.symmetric_difference(prev_urls))

          if not changed_urls:
              print("No URL changes detected in sitemap; skipping IndexNow.")
              sys.exit(0)

          body = {
              "host": "torensa.com",
              "key": "c5683bf624454ee2a78fff4acb82ef83",
              "keyLocation": "https://torensa.com/c5683bf624454ee2a78fff4acb82ef83.txt",
              "urlList": changed_urls,
          }

          with open("indexnow.json", "w", encoding="utf-8") as f:
              json.dump(body, f)

          print(f"IndexNow URL count: {len(changed_urls)}")
          PY

          if [ -f indexnow.json ]; then
            status=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Content-Type: application/json; charset=utf-8" \
              -d @indexnow.json \
              https://api.indexnow.org/IndexNow)
            echo "IndexNow status: $status"
          fi
